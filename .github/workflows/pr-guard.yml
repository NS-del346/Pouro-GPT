name: PR Guard

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  protected-files:
    name: Protected files check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List changed files
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          git diff --name-only "origin/$GITHUB_BASE_REF...HEAD" | tee changed_files.txt

      - name: Block protected file changes
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          echo "Checking protected files..."

          protected_pattern='^(package\.json|package-lock\.json|vite\.config\..*|public/|src/service-worker\.ts|src/sw\.ts)$'
          mapfile -t protected_files < <(grep -E "$protected_pattern" changed_files.txt || true)

          if (( ${#protected_files[@]} == 0 )); then
            echo "No protected file changes detected."
            exit 0
          fi

          if [[
            "$PR_NUMBER" == "108" &&
            "$PR_HEAD_REF" == "codex/pr-ab-00-test-feature-flag-foundation" &&
            "$PR_BODY" == *"POURO-GPT-PR-GUARD-PR108-ONE-TIME-EXCEPTION-AND-RECHECK-HG-019"*
          ]]; then
            git fetch origin "$PR_HEAD_SHA" --depth=1
            current_tree="$(git rev-parse "$PR_HEAD_SHA^{tree}")"
            actual="$(printf '%s\n' "${protected_files[@]}" | sort -u)"
            expected=$'package-lock.json\npackage.json'

            if [[
              "$current_tree" == "ba6790559de00c000c65a2e86eec735c7a2b84ce" &&
              "$actual" == "$expected"
            ]]; then
              echo "Approved one-time content-bound exception for PR #108."
              exit 0
            fi
          fi

          printf 'Protected file change detected: %s\n' "${protected_files[@]}"
          echo "Split this into a dedicated PR with explicit approval."
          exit 1
